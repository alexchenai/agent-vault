services:
    agent-vault:
        name: agent-vault
        hosts:
            - agent-vault.chitacloud.dev
        port: 3000
        ttl: 777600
        memory: 512
        cpu: 0.5
        dockerfile: Dockerfile
        docker_context: .
        handler: Handle
        public_invoke: true
        files:
            - package.json
            - package-lock.json
            - tsconfig.json
            - src
            - public
            - Dockerfile
        working_directory: /app/data/agent-vault
